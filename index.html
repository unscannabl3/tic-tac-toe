<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a0aec0;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 2rem;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #1a1a2e;
      border: 2px solid #2d2d44;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #252547;
      border-color: #3b82f6;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #6ee7b7; }
    .cell.o { color: #f472b6; }

    .cell.win {
      background: #1e3a5f;
      border-color: #3b82f6;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 5px rgba(59,130,246,0.3); }
      to   { box-shadow: 0 0 20px rgba(59,130,246,0.7); }
    }

    .btn {
      padding: 12px 32px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0f0f23;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(59,130,246,0.4);
    }

    .scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    .scoreboard span { opacity: 0.7; }
    .scoreboard strong { color: #6ee7b7; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="status" id="status">X's turn</div>

  <div class="scoreboard">
    <span>X: <strong id="x-score">0</strong></span>
    <span>Draws: <strong id="d-score">0</strong></span>
    <span>O: <strong id="o-score">0</strong></span>
  </div>

  <div class="board" id="board"></div>

  <button class="btn" id="reset-btn">New Game</button>

  <script>
    const WIN_COMBOS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, D: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');

    function render() {
      boardEl.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (board[i]) {
          cell.textContent = board[i];
          cell.classList.add(board[i].toLowerCase(), 'taken');
        }
        cell.addEventListener('click', () => play(i));
        boardEl.appendChild(cell);
      }
    }

    function checkWin() {
      for (const combo of WIN_COMBOS) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], combo };
        }
      }
      if (!board.includes('')) return { winner: 'D' };
      return null;
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = currentPlayer;

      const result = checkWin();
      if (result) {
        gameOver = true;
        if (result.winner === 'D') {
          statusEl.textContent = "It's a draw!";
          scores.D++;
        } else {
          statusEl.textContent = `${result.winner} wins! 🎉`;
          scores[result.winner]++;
          highlightWin(result.combo);
        }
        updateScores();
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        statusEl.textContent = `${currentPlayer}'s turn`;
      }
      render();
    }

    function highlightWin(combo) {
      const cells = boardEl.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function updateScores() {
      document.getElementById('x-score').textContent = scores.X;
      document.getElementById('o-score').textContent = scores.O;
      document.getElementById('d-score').textContent = scores.D;
    }

    resetBtn.addEventListener('click', () => {
      board = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = "X's turn";
      render();
    });

    render();
  </script>
</body>
</html>
